<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INAAYA MEHDEE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  overflow-x: hidden;
  width: 100%;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
  background: #3b3b6b;
}

h1 {
  font-size: clamp(40px, 10vw, 90px);
  text-align: center;
  padding: 30px 0 10px;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  background: linear-gradient(90deg, #ff6b9d, #c84bfa, #6dd5fa, #ff6b9d);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s ease-in-out infinite;
}

@keyframes shimmer {
  0%   { background-position: 0% 50%; text-shadow: none; transform: scale(1); }
  50%  { background-position: 100% 50%; transform: scale(1.03); }
  100% { background-position: 0% 50%; transform: scale(1); }
}

hr {
  width: 80%;
  border: none;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff69b4, #a66cff, #45b7d1, transparent);
  margin-bottom: 20px;
}

/* hr defined above */

/* Two column layout */
.columns {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: clamp(20px, 5vw, 80px);
  width: 100%;
  padding: 20px;
  flex-wrap: nowrap;
}

.column {
  display: flex;
  justify-content: center;
  align-items: center;
}

.family-group {
  display: flex;
  align-items: flex-end;
  gap: 15px;
}

.column-puppy {
  flex-direction: column;
  gap: 15px;
}

.puppy-label {
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  font-size: 22px;
  font-weight: bold;
  color: #ffd9a0;
  text-align: center;
  text-shadow: 0 0 10px rgba(255, 200, 120, 0.5);
  animation: labelBounce 2s ease-in-out infinite alternate;
}

@keyframes labelBounce {
  0%   { transform: translateY(-10px); }
  100% { transform: translateY(10px); }
}

/* ========== GIRL ========== */
.girl {
  position: relative;
  width: 110px;
  height: 210px;
  cursor: pointer;
}

.girl-hair {
  position: absolute;
  width: 70px;
  height: 50px;
  background: #2c1810;
  border-radius: 50% 50% 0 0;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
}

.girl-head {
  position: absolute;
  width: 60px;
  height: 55px;
  background: #f5d0a9;
  border-radius: 50%;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
}

.girl-hair-side {
  position: absolute;
  width: 18px;
  height: 70px;
  background: #2c1810;
  border-radius: 0 0 40% 40%;
  top: 20px;
  z-index: 2;
}
.girl-hair-left { left: 18px; }
.girl-hair-right { right: 18px; }

.girl-eye {
  position: absolute;
  width: 8px;
  height: 10px;
  background: #2c1810;
  border-radius: 50%;
  top: 18px;
  animation: girlBlink 3.5s infinite;
}
.girl-eye::after {
  content: '';
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 2px;
}
.girl-eye-left { left: 14px; }
.girl-eye-right { right: 14px; }

@keyframes girlBlink {
  0%, 90%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

.girl-smile {
  position: absolute;
  width: 16px;
  height: 8px;
  border-bottom: 3px solid #e07060;
  border-radius: 0 0 50% 50%;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
}

.girl-blush {
  position: absolute;
  width: 10px;
  height: 6px;
  background: rgba(255, 150, 150, 0.5);
  border-radius: 50%;
  top: 30px;
}
.girl-blush-left { left: 6px; }
.girl-blush-right { right: 6px; }

.girl-dress {
  position: absolute;
  width: 55px;
  height: 70px;
  background: #ff69b4;
  border-radius: 10px 10px 30% 30%;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}
.girl-dress::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: -8px;
  right: -8px;
  height: 15px;
  background: #ff85c8;
  border-radius: 0 0 50% 50%;
}

.girl-arm {
  position: absolute;
  width: 12px;
  height: 50px;
  background: #f5d0a9;
  border-radius: 8px;
  top: 75px;
  z-index: 2;
}
.girl-arm-left {
  left: 18px;
  transform: rotate(15deg);
}
.girl-arm-right {
  right: 18px;
  transform-origin: top center;
  animation: wave 0.6s ease-in-out infinite alternate;
}

.girl-hand {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #f5d0a9;
  border-radius: 50%;
  bottom: -4px;
  left: -1px;
}

@keyframes wave {
  0% { transform: rotate(-30deg); }
  100% { transform: rotate(-70deg); }
}

.girl-leg {
  position: absolute;
  width: 14px;
  height: 45px;
  background: #f5d0a9;
  border-radius: 8px;
  bottom: 12px;
  z-index: 0;
}
.girl-leg-left { left: 35px; }
.girl-leg-right { right: 35px; }

.girl-shoe {
  position: absolute;
  width: 18px;
  height: 10px;
  background: #ff1493;
  border-radius: 50% 50% 40% 40%;
  bottom: 7px;
  z-index: 0;
}
.girl-shoe-left { left: 33px; }
.girl-shoe-right { right: 33px; }

.speech-bubble {
  position: absolute;
  top: -10px;
  right: -15px;
  background: white;
  border: 2px solid #ff69b4;
  border-radius: 15px;
  padding: 5px 12px;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  font-size: 14px;
  font-weight: bold;
  color: #ff1493;
  z-index: 10;
  animation: bubblePop 1.5s ease-in-out infinite alternate;
  white-space: nowrap;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 15px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid #ff69b4;
}

@keyframes bubblePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* ========== FLYING PUPPY ========== */
.puppy {
  position: relative;
  cursor: pointer;
  animation: puppyHover 2s ease-in-out infinite alternate;
}

@keyframes puppyHover {
  0%   { transform: translateY(-10px); }
  100% { transform: translateY(10px); }
}

.puppy .body {
  position: relative;
  width: 120px;
  height: 100px;
}

.puppy .head {
  position: absolute;
  width: 50px;
  height: 45px;
  background: #c89664;
  border-radius: 50% 50% 45% 45%;
  top: 5px;
  left: 0;
  z-index: 3;
}

.puppy .eye {
  position: absolute;
  width: 10px;
  height: 12px;
  background: #2c1810;
  border-radius: 50%;
  top: 14px;
  animation: blink 3s infinite;
}
.puppy .eye::after {
  content: '';
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  top: 2px;
  left: 2px;
}
.puppy .eye-left { left: 10px; }
.puppy .eye-right { right: 10px; }

@keyframes blink {
  0%, 90%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

.puppy .nose {
  position: absolute;
  width: 12px;
  height: 8px;
  background: #2c1810;
  border-radius: 50%;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
}

.puppy .tongue {
  position: absolute;
  width: 8px;
  height: 12px;
  background: #ff6b8a;
  border-radius: 0 0 50% 50%;
  bottom: 0px;
  left: 50%;
  transform: translateX(-50%);
  animation: pant 0.4s ease-in-out infinite alternate;
  z-index: 2;
}

@keyframes pant {
  0% { height: 10px; }
  100% { height: 14px; }
}

.puppy .ear {
  position: absolute;
  width: 20px;
  height: 30px;
  background: #a0724a;
  border-radius: 50% 50% 40% 40%;
  top: -5px;
  z-index: 2;
  animation: earFlop 1s ease-in-out infinite alternate;
}
.puppy .ear-left {
  left: 2px;
  transform-origin: top center;
  transform: rotate(15deg);
}
.puppy .ear-right {
  left: 32px;
  transform-origin: top center;
  transform: rotate(-15deg);
}

@keyframes earFlop {
  0% { transform: rotate(15deg); }
  100% { transform: rotate(25deg); }
}

.puppy .torso {
  position: absolute;
  width: 70px;
  height: 45px;
  background: #c89664;
  border-radius: 40% 55% 50% 40%;
  top: 30px;
  left: 30px;
  z-index: 1;
}

.puppy .tail {
  position: absolute;
  width: 8px;
  height: 30px;
  background: #a0724a;
  border-radius: 50%;
  top: 20px;
  right: 5px;
  transform-origin: bottom center;
  animation: wag 0.3s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes wag {
  0% { transform: rotate(-20deg); }
  100% { transform: rotate(20deg); }
}

.puppy .leg {
  position: absolute;
  width: 12px;
  height: 25px;
  background: #c89664;
  border-radius: 5px 5px 8px 8px;
  bottom: 0;
  z-index: 0;
  animation: legKick 0.5s ease-in-out infinite alternate;
}
.puppy .leg-front-left  { left: 32px; }
.puppy .leg-front-right { left: 48px; animation-delay: 0.15s; }
.puppy .leg-back-left   { left: 72px; animation-delay: 0.25s; }
.puppy .leg-back-right  { left: 88px; animation-delay: 0.4s; }

@keyframes legKick {
  0% { transform: rotate(10deg); }
  100% { transform: rotate(-10deg); }
}

.puppy .wing {
  position: absolute;
  width: 40px;
  height: 20px;
  background: rgba(255, 255, 255, 0.8);
  border-radius: 50% 50% 20% 20%;
  z-index: 5;
  animation: flap 0.3s ease-in-out infinite alternate;
  box-shadow: 0 0 10px rgba(255,182,193,0.5);
}
.puppy .wing-left {
  top: 20px;
  left: 30px;
  transform-origin: right bottom;
}
.puppy .wing-right {
  top: 20px;
  right: 0px;
  transform-origin: left bottom;
}

@keyframes flap {
  0% { transform: rotate(20deg) scaleY(1); }
  100% { transform: rotate(-15deg) scaleY(0.8); }
}

/* ========== TABS ========== */
.tabs-container {
  width: 100%;
  max-width: 700px;
  padding: 20px 20px 30px;
}

.tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
}

.tab-btn {
  flex: 1;
  padding: 12px 20px;
  font-size: 18px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: rgba(255,255,255,0.5);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.3s;
}

.tab-btn.active {
  color: white;
  background: linear-gradient(135deg, #ff6b6b, #a66cff, #45b7d1);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* ========== ALPHABET BUTTONS ========== */
.alphabet-section {
  width: 100%;
}

.alphabet-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
  gap: 10px;
  justify-items: center;
}

.alpha-btn {
  width: 55px;
  height: 55px;
  border: none;
  border-radius: 12px;
  font-size: 22px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  box-shadow: 0 4px 6px rgba(0,0,0,0.15);
}

/* Rainbow colors for buttons */
.alpha-btn:nth-child(26n+1)  { background: #ff6b6b; }
.alpha-btn:nth-child(26n+2)  { background: #ff8e53; }
.alpha-btn:nth-child(26n+3)  { background: #ffc048; }
.alpha-btn:nth-child(26n+4)  { background: #ffd93d; }
.alpha-btn:nth-child(26n+5)  { background: #6bcb77; }
.alpha-btn:nth-child(26n+6)  { background: #4ecdc4; }
.alpha-btn:nth-child(26n+7)  { background: #45b7d1; }
.alpha-btn:nth-child(26n+8)  { background: #5f7fee; }
.alpha-btn:nth-child(26n+9)  { background: #a66cff; }
.alpha-btn:nth-child(26n+10) { background: #e36bae; }
.alpha-btn:nth-child(26n+11) { background: #ff6b6b; }
.alpha-btn:nth-child(26n+12) { background: #ff8e53; }
.alpha-btn:nth-child(26n+13) { background: #ffc048; }
.alpha-btn:nth-child(26n+14) { background: #6bcb77; }
.alpha-btn:nth-child(26n+15) { background: #4ecdc4; }
.alpha-btn:nth-child(26n+16) { background: #45b7d1; }
.alpha-btn:nth-child(26n+17) { background: #5f7fee; }
.alpha-btn:nth-child(26n+18) { background: #a66cff; }
.alpha-btn:nth-child(26n+19) { background: #e36bae; }
.alpha-btn:nth-child(26n+20) { background: #ff6b6b; }
.alpha-btn:nth-child(26n+21) { background: #ffd93d; }
.alpha-btn:nth-child(26n+22) { background: #6bcb77; }
.alpha-btn:nth-child(26n+23) { background: #45b7d1; }
.alpha-btn:nth-child(26n+24) { background: #5f7fee; }
.alpha-btn:nth-child(26n+25) { background: #a66cff; }
.alpha-btn:nth-child(26n+26) { background: #e36bae; }

.alpha-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 6px 12px rgba(0,0,0,0.25);
}

.alpha-btn:active {
  transform: scale(0.95);
}

.alpha-btn.pop {
  animation: popAnim 0.3s ease;
}

@keyframes popAnim {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Play / Sing button */
.play-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 12px 30px;
  font-size: 20px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: white;
  background: linear-gradient(135deg, #ff6b6b, #a66cff, #45b7d1);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 6px 16px rgba(0,0,0,0.3);
}
.play-btn:active {
  transform: scale(0.96);
}
.play-btn.singing {
  animation: pulseBtn 0.6s ease-in-out infinite alternate;
}
@keyframes pulseBtn {
  0%   { transform: scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  100% { transform: scale(1.06); box-shadow: 0 6px 18px rgba(166,108,255,0.4); }
}

/* ========== TIC TAC TOE ========== */
.ttt-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.ttt-status {
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  font-size: 22px;
  font-weight: bold;
  color: #ffd93d;
  text-align: center;
  margin-bottom: 15px;
  min-height: 30px;
}

.ttt-board {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  grid-template-rows: repeat(3, 90px);
  gap: 8px;
}

.ttt-cell {
  width: 90px;
  height: 90px;
  background: rgba(255,255,255,0.1);
  border: 3px solid rgba(255,255,255,0.2);
  border-radius: 15px;
  font-size: 40px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: white;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ttt-cell:hover {
  background: rgba(255,255,255,0.2);
}

.ttt-cell.x { color: #ff6b6b; }
.ttt-cell.o { color: #45b7d1; }
.ttt-cell.win { background: rgba(255,215,61,0.3); border-color: #ffd93d; }

.ttt-reset {
  margin-top: 15px;
  padding: 10px 25px;
  font-size: 18px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: white;
  background: linear-gradient(135deg, #ff6b6b, #a66cff);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}

.ttt-reset:hover { transform: scale(1.08); }
.ttt-reset:active { transform: scale(0.96); }

/* ========== MEMORY GAME ========== */
.memory-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.memory-status {
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  font-size: 20px;
  font-weight: bold;
  color: #ffd93d;
  text-align: center;
  margin-bottom: 15px;
}

.memory-board {
  display: grid;
  grid-template-columns: repeat(4, 75px);
  grid-template-rows: repeat(3, 75px);
  gap: 10px;
}

.memory-card {
  width: 75px;
  height: 75px;
  border-radius: 12px;
  border: 3px solid rgba(255,255,255,0.2);
  background: linear-gradient(135deg, #a66cff, #45b7d1);
  font-size: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s, background 0.3s;
  user-select: none;
}

.memory-card.flipped {
  background: rgba(255,255,255,0.15);
  border-color: #ffd93d;
  transform: rotateY(180deg);
}

.memory-card.matched {
  background: rgba(107,203,119,0.3);
  border-color: #6bcb77;
  cursor: default;
}

.memory-reset {
  margin-top: 15px;
  padding: 10px 25px;
  font-size: 18px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: white;
  background: linear-gradient(135deg, #6bcb77, #45b7d1);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.memory-reset:hover { transform: scale(1.08); }
.memory-reset:active { transform: scale(0.96); }

/* ========== DRAWING PAD ========== */
.draw-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.draw-toolbar {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.draw-color {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3);
  cursor: pointer;
  transition: transform 0.15s;
}
.draw-color:hover { transform: scale(1.2); }
.draw-color.active { border-color: #ffd93d; transform: scale(1.2); }

.draw-size {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.draw-size.active { border-color: #ffd93d; }

.draw-canvas {
  border-radius: 15px;
  border: 3px solid rgba(255,255,255,0.2);
  background: white;
  cursor: crosshair;
  touch-action: none;
  max-width: 100%;
}

.draw-clear {
  margin-top: 10px;
  padding: 10px 25px;
  font-size: 18px;
  font-weight: bold;
  font-family: 'Comic Sans MS', 'Comic Sans', 'Chalkboard SE', 'Arial Rounded MT Bold', sans-serif;
  color: white;
  background: linear-gradient(135deg, #ff6b6b, #ff8e53);
  border: none;
  border-radius: 25px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: transform 0.2s;
}
.draw-clear:hover { transform: scale(1.08); }
.draw-clear:active { transform: scale(0.96); }

/* ========== BABY (HAMZA) ========== */

      <button class="play-btn" id="playBtn">&#9654; Sing ABC</button>
      <div class="alphabet-grid" id="alphabetGrid"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-ttt">
    <div class="ttt-section">
      <div class="ttt-status" id="tttStatus">Your turn! (X)</div>
      <div class="ttt-board" id="tttBoard"></div>
      <button class="ttt-reset" id="tttReset">Play Again</button>
    </div>
  </div>

  <div class="tab-content" id="tab-memory">
    <div class="memory-section">
      <div class="memory-status" id="memoryStatus">Find the pairs!</div>
      <div class="memory-board" id="memoryBoard"></div>
      <button class="memory-reset" id="memoryReset">New Game</button>
    </div>
  </div>

  <div class="tab-content" id="tab-draw">
    <div class="draw-section">
      <div class="draw-toolbar" id="drawToolbar"></div>
      <canvas class="draw-canvas" id="drawCanvas" width="350" height="400"></canvas>
      <button class="draw-clear" id="drawClear">Clear</button>
    </div>
  </div>
</div>

<script>
const grid = document.getElementById('alphabetGrid');
const synth = window.speechSynthesis;
const playBtn = document.getElementById('playBtn');
const allBtns = [];
let singing = false;
let audioCtx = null;

// ABC song notes mapped to "Twinkle Twinkle" melody
// Each entry: [letter index (0-25 or -1 for non-letter), note frequency, duration in ms]
const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00, A4=440.00, B4=493.88, C5=523.25;

const abcSong = [
  // A B C D E F G  (Twinkle twinkle little star)
  [0, C4, 500], [1, C4, 500], [2, G4, 500], [3, G4, 500],
  [4, A4, 500], [5, A4, 500], [6, G4, 1000],
  // H I J K  L M N O P  (How I wonder what you are)
  [7, F4, 500], [8, F4, 500], [9, E4, 500], [10, E4, 500],
  [11, D4, 250], [12, D4, 250], [13, D4, 250], [14, D4, 250], [15, C4, 1000],
  // Q R S  T U V  (Up above the world so high)
  [16, G4, 500], [17, G4, 500], [18, F4, 500], [19, F4, 500],
  [20, E4, 500], [21, E4, 500], [-1, D4, 1000],
  // W X  Y and Z  (Like a diamond in the sky)
  [22, G4, 500], [23, G4, 500], [24, F4, 500], [-1, F4, 500],
  [25, E4, 500], [-1, E4, 500], [-1, D4, 1000],
  // Now I know my ABCs  (Twinkle twinkle little star)
  [-1, C4, 500], [-1, C4, 500], [-1, G4, 500], [-1, G4, 500],
  [-1, A4, 500], [-1, A4, 500], [-1, G4, 1000],
  // Next time won't you sing with me  (How I wonder what you are)
  [-1, F4, 500], [-1, F4, 500], [-1, E4, 500], [-1, E4, 500],
  [-1, D4, 500], [-1, D4, 500], [-1, C4, 1000],
];

function playNote(freq, duration, startTime) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, startTime);
  gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration / 1000 - 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration / 1000);
}

playBtn.addEventListener('click', function() {
  if (singing) {
    singing = false;
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
    playBtn.textContent = '\u25B6 Sing ABC';
    playBtn.classList.remove('singing');
    allBtns.forEach(b => b.classList.remove('pop'));
    return;
  }

  singing = true;
  playBtn.textContent = '\u25A0 Stop';
  playBtn.classList.add('singing');

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let time = audioCtx.currentTime + 0.1;
  let elapsed = 0;

  // Schedule all notes
  abcSong.forEach(([letterIdx, freq, dur]) => {
    playNote(freq, dur, time);

    // Highlight the button
    if (letterIdx >= 0 && letterIdx < 26) {
      const delay = elapsed;
      setTimeout(() => {
        if (!singing) return;
        allBtns.forEach(b => b.classList.remove('pop'));
        allBtns[letterIdx].classList.add('pop');
      }, delay);
    }

    elapsed += dur;
    time += dur / 1000;
  });

  // End
  setTimeout(() => {
    if (!singing) return;
    singing = false;
    playBtn.textContent = '\u25B6 Sing ABC';
    playBtn.classList.remove('singing');
    allBtns.forEach(b => b.classList.remove('pop'));
    if (audioCtx) { audioCtx.close(); audioCtx = null; }
  }, elapsed + 200);
});

// Character click sounds
document.querySelector('.girl').addEventListener('click', function() {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance('Hi, I am Inaya');
  utter.rate = 1.2;
  utter.pitch = 2.0;
  synth.speak(utter);
});

document.querySelector('.baby').addEventListener('click', function() {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance('goo goo ga ga');
  utter.rate = 0.6;
  utter.pitch = 2.0;
  synth.speak(utter);
});

document.querySelector('.puppy').addEventListener('click', function() {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance('woof woof');
  utter.rate = 1.0;
  utter.pitch = 0.8;
  synth.speak(utter);
});

document.querySelector('.daddy').addEventListener('click', function() {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance('Hey kids!');
  utter.rate = 0.7;
  utter.pitch = 0.3;
  synth.speak(utter);
});

document.querySelector('.mommy').addEventListener('click', function() {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance('I love you all!');
  utter.rate = 0.9;
  utter.pitch = 1.1;
  synth.speak(utter);
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
  });
});

// ========== TIC TAC TOE (vs Computer) ==========
const tttBoard = document.getElementById('tttBoard');
const tttStatus = document.getElementById('tttStatus');
const tttReset = document.getElementById('tttReset');
let board = Array(9).fill('');
let gameOver = false;
let playerTurn = true;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function createBoard() {
  tttBoard.innerHTML = '';
  board = Array(9).fill('');
  gameOver = false;
  playerTurn = true;
  tttStatus.textContent = 'Your turn! (X)';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('button');
    cell.className = 'ttt-cell';
    cell.dataset.index = i;
    cell.addEventListener('click', handleCellClick);
    tttBoard.appendChild(cell);
  }
}

function checkWin(player) {
  for (const pattern of winPatterns) {
    if (pattern.every(i => board[i] === player)) return pattern;
  }
  return null;
}

function tttSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  if (type === 'placeX') {
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } else if (type === 'placeO') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.18);
    osc.start(); osc.stop(ctx.currentTime + 0.18);
  } else if (type === 'win') {
    osc.type = 'triangle';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(523, t);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.setValueAtTime(0.3, t + 0.15);
    osc.frequency.setValueAtTime(659, t + 0.15);
    gain.gain.setValueAtTime(0.3, t + 0.3);
    osc.frequency.setValueAtTime(784, t + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
    osc.start(); osc.stop(t + 0.6);
  } else if (type === 'tie') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  } else if (type === 'lose') {
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
    osc.start(); osc.stop(ctx.currentTime + 0.45);
  }
}

function placeMove(idx, player) {
  board[idx] = player;
  const cell = tttBoard.children[idx];
  cell.textContent = player;
  cell.classList.add(player.toLowerCase());
}

function computerMove() {
  if (gameOver) return;
  const empty = board.map((v,i) => v ? -1 : i).filter(i => i >= 0);
  if (!empty.length) return;
  // 30% of the time just play randomly (medium mode)
  if (Math.random() < 0.3) {
    return empty[Math.floor(Math.random() * empty.length)];
  }
  // 30% of the time try to win or block
  for (let i = 0; i < 9; i++) {
    if (!board[i]) {
      board[i] = 'O';
      if (checkWin('O')) { board[i] = ''; return i; }
      board[i] = '';
    }
  }
  for (let i = 0; i < 9; i++) {
    if (!board[i]) {
      board[i] = 'X';
      if (checkWin('X')) { board[i] = ''; return i; }
      board[i] = '';
    }
  }
  return empty[Math.floor(Math.random() * empty.length)];
}

function checkGameEnd(player) {
  const winPattern = checkWin(player);
  if (winPattern) {
    gameOver = true;
    winPattern.forEach(i => tttBoard.children[i].classList.add('win'));
    if (player === 'X') {
      tttStatus.textContent = 'You win!';
      tttSound('win');
    } else {
      tttStatus.textContent = 'Computer wins!';
      tttSound('lose');
    }
    return true;
  }
  if (board.every(c => c)) {
    gameOver = true;
    tttStatus.textContent = "It's a tie!";
    tttSound('tie');
    return true;
  }
  return false;
}

function handleCellClick(e) {
  if (gameOver || !playerTurn) return;
  const idx = parseInt(e.target.dataset.index);
  if (board[idx]) return;

  placeMove(idx, 'X');
  tttSound('placeX');
  if (checkGameEnd('X')) return;

  playerTurn = false;
  tttStatus.textContent = 'Computer thinking...';
  setTimeout(() => {
    const move = computerMove();
    if (move !== undefined) {
      placeMove(move, 'O');
      tttSound('placeO');
      if (checkGameEnd('O')) return;
    }
    playerTurn = true;
    tttStatus.textContent = 'Your turn! (X)';
  }, 500);
}

tttReset.addEventListener('click', createBoard);
createBoard();

// ========== MEMORY GAME ==========
const memoryBoard = document.getElementById('memoryBoard');
const memoryStatus = document.getElementById('memoryStatus');
const memoryReset = document.getElementById('memoryReset');
const emojis = ['🐶','🐱','🦋','🌟','🎈','🍎'];
let memCards = [];
let memFlipped = [];
let memMatched = 0;
let memLocked = false;
let memMoves = 0;

function memSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  if (type === 'flip') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } else if (type === 'match') {
    osc.type = 'triangle';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(523, t);
    osc.frequency.setValueAtTime(784, t + 0.12);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc.start(); osc.stop(t + 0.3);
  } else if (type === 'wrong') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } else if (type === 'win') {
    osc.type = 'triangle';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(523, t);
    osc.frequency.setValueAtTime(659, t + 0.15);
    osc.frequency.setValueAtTime(784, t + 0.3);
    osc.frequency.setValueAtTime(1047, t + 0.45);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.7);
    osc.start(); osc.stop(t + 0.7);
  }
}

function createMemoryGame() {
  memoryBoard.innerHTML = '';
  memCards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  memFlipped = [];
  memMatched = 0;
  memLocked = false;
  memMoves = 0;
  memoryStatus.textContent = 'Find the pairs!';

  memCards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'memory-card';
    card.dataset.index = i;
    card.dataset.emoji = emoji;
    card.textContent = '?';
    card.addEventListener('click', handleMemoryClick);
    memoryBoard.appendChild(card);
  });
}

function handleMemoryClick(e) {
  if (memLocked) return;
  const card = e.target;
  const idx = parseInt(card.dataset.index);
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

  card.textContent = card.dataset.emoji;
  card.classList.add('flipped');
  memFlipped.push(card);
  memSound('flip');

  if (memFlipped.length === 2) {
    memMoves++;
    memLocked = true;
    const [a, b] = memFlipped;

    if (a.dataset.emoji === b.dataset.emoji) {
      a.classList.add('matched');
      b.classList.add('matched');
      memMatched++;
      memSound('match');
      memFlipped = [];
      memLocked = false;

      if (memMatched === emojis.length) {
        memoryStatus.textContent = 'You won in ' + memMoves + ' moves!';
        memSound('win');
      } else {
        memoryStatus.textContent = 'Moves: ' + memMoves;
      }
    } else {
      memoryStatus.textContent = 'Moves: ' + memMoves;
      setTimeout(() => {
        memSound('wrong');
        a.textContent = '?';
        b.textContent = '?';
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        memFlipped = [];
        memLocked = false;
      }, 800);
    }
  }
}

memoryReset.addEventListener('click', createMemoryGame);
createMemoryGame();

// ========== DRAWING PAD ==========
const drawCanvas = document.getElementById('drawCanvas');
const drawCtx = drawCanvas.getContext('2d');
const drawToolbar = document.getElementById('drawToolbar');
const drawClear = document.getElementById('drawClear');
let drawing = false;
let drawColor = '#ff6b6b';
let drawSize = 5;

const colors = ['#ff6b6b','#ff8e53','#ffd93d','#6bcb77','#45b7d1','#5f7fee','#a66cff','#e36bae','#1a1a1a','#ffffff'];
const sizes = [3, 8, 15];

colors.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'draw-color' + (c === drawColor ? ' active' : '');
  btn.style.background = c;
  btn.addEventListener('click', () => {
    drawToolbar.querySelectorAll('.draw-color').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawColor = c;
  });
  drawToolbar.appendChild(btn);
});

sizes.forEach(s => {
  const btn = document.createElement('div');
  btn.className = 'draw-size' + (s === drawSize ? ' active' : '');
  btn.innerHTML = '<div style="width:' + Math.min(s*2,24) + 'px;height:' + Math.min(s*2,24) + 'px;background:white;border-radius:50%"></div>';
  btn.addEventListener('click', () => {
    drawToolbar.querySelectorAll('.draw-size').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawSize = s;
  });
  drawToolbar.appendChild(btn);
});

function getDrawPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top) * scaleY
  };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  const pos = getDrawPos(e);
  drawCtx.beginPath();
  drawCtx.moveTo(pos.x, pos.y);
}

function doDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getDrawPos(e);
  drawCtx.lineWidth = drawSize;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawCtx.strokeStyle = drawColor;
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();
}

function stopDraw() { drawing = false; }

drawCanvas.addEventListener('mousedown', startDraw);
drawCanvas.addEventListener('mousemove', doDraw);
drawCanvas.addEventListener('mouseup', stopDraw);
drawCanvas.addEventListener('mouseleave', stopDraw);
drawCanvas.addEventListener('touchstart', startDraw);
drawCanvas.addEventListener('touchmove', doDraw);
drawCanvas.addEventListener('touchend', stopDraw);

drawClear.addEventListener('click', () => {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
});

// Individual letter buttons
for (let i = 65; i <= 90; i++) {
  const letter = String.fromCharCode(i);
  const btn = document.createElement('button');
  btn.className = 'alpha-btn';
  btn.textContent = letter;
  btn.addEventListener('click', function() {
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(letter.toLowerCase());
    utter.rate = 0.8;
    utter.pitch = 1.2;
    synth.speak(utter);
    btn.classList.add('pop');
    setTimeout(() => btn.classList.remove('pop'), 300);
  });
  grid.appendChild(btn);
  allBtns.push(btn);
}
</script>

</body>
